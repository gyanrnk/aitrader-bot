name: collect-market-data

# Reliable free 24/7 collection WITHOUT any external account or token:
# each run LOOPS internally, collecting every 10 min for ~5 hours. So even GitHub's
# slow/erratic scheduler gives near-continuous data — one run covers 5 hours, and the
# next queued run picks up when it ends (concurrency serializes them). Public repos
# get unlimited Actions minutes, so this is free.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write        # GO-signal alert: collector opens an issue -> GitHub emails the owner

concurrency:
  group: collect
  cancel-in-progress: false     # queue new runs behind the active one (chain them)

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 330         # ~5.5h, safely under GitHub's 6h job limit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install numpy pandas
      - name: Collect every 10 min for ~5 hours
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          END=$(( $(date +%s) + 17400 ))     # loop for 4h50m, then exit cleanly
          while [ "$(date +%s)" -lt "$END" ]; do
            python collector.py || true
            if [ -n "$(git status --porcelain data)" ]; then
              git add data
              git commit -m "data: snapshot $(date -u +%FT%TZ)" || true
              git pull --rebase -X ours -q origin master || true
              git push -q origin master || true
            fi
            sleep 600
          done
